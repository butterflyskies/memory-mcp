[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# CI backends to support
ci = "github"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Whether to embed dependency information using cargo-auditable
cargo-auditable = true
# The installers to generate for each app
installers = ["shell"]
# Publish jobs to run in CI
publish-jobs = ["./publish-crate"]
# Features to pass to cargo build
features = ["k8s"]
# Post-announce jobs to run in CI
post-announce-jobs = ["./publish-image", "./update-release-notes"]
# Where to host releases
hosting = "github"
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# Allow modified CI files — we harden the generated workflow (SHA pins,
# per-job permissions, expression injection fixes, cargo install over curl|sh)
allow-dirty = ["ci"]

# System dependencies for Linux builds (libdbus required by keyring crate)
[dist.dependencies.apt]
libdbus-1-dev = '*'
pkg-config = '*'
