name: Lint PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit prefix in PR title.
          # Major bumps: use ! suffix (e.g., "feat!: breaking change")
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
          requireScope: false
          # Squash-merge means PR title = commit message on main.
          # This ensures release-please can parse all commits.
          subjectPattern: ^.+$
          subjectPatternError: "PR title must not be empty after the type prefix."
