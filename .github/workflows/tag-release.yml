# Detect version bumps on main and create a git tag.
# The tag push triggers the cargo-dist release workflow (release.yml),
# which builds artifacts and generates release notes from the dist manifest.
# CHANGELOG.md automation tracked in #98.
name: Tag Release

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'

# Only one tag-release at a time.
concurrency:
  group: tag-release
  cancel-in-progress: false

permissions: {}

jobs:
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Use the release-manager GitHub App so that the tag push triggers
      # downstream workflows (release.yml). The default GITHUB_TOKEN
      # doesn't trigger workflows due to the anti-cascade rule.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for version bump
        id: check
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — no release needed"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${version} detected"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.release == 'true'
        run: |
          git tag "${{ steps.check.outputs.tag_name }}"
          git push origin "${{ steps.check.outputs.tag_name }}"

      - name: Summary
        if: steps.check.outputs.release == 'true'
        run: |
          echo "### Release ${{ steps.check.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag created and pushed. cargo-dist release workflow will handle the rest." >> "$GITHUB_STEP_SUMMARY"
