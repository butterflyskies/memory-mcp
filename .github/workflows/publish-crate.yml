# Publish to crates.io using Trusted Publishing (OIDC — no API token needed).
# Called by the cargo-dist release workflow as a custom publish job.
name: Publish Crate

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master (2026-02-13)
        with:
          toolchain: stable
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth
      # --no-verify: skip the verification rebuild. cargo-dist already built
      # and tested the release artifacts; rebuilding here is redundant and
      # requires system dependencies (libdbus-1-dev) not present in this job.
      - name: Publish crate
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
