# Publish to crates.io using Trusted Publishing (OIDC — no API token needed).
# Called by the release workflow after the draft release is created.
name: Publish Crate

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (2026-03-27)
        with:
          toolchain: stable
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      # --no-verify: skip the verification rebuild. CI already built and tested;
      # rebuilding here requires system dependencies (libdbus-1-dev) not present.
      # --locked is intentionally omitted: cargo publish resolves against
      # the live crates.io index, and transitive dependency patches published
      # between commit and release cause --locked to fail. The lockfile is
      # not shipped in the published crate anyway.
      - name: Publish crate
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
